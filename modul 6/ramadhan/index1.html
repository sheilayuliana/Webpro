<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Marhaban ya Ramadan</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.header {
    padding: 40px;
}

@keyframes sparkle {
    from { transform: translateY(0); }
    to { transform: translateY(20px); }
}

/* HERO */
.container {
    margin-top: 80px;
}

h1 {
    font-size: 42px;
}

p {
    font-size: 18px;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    background: gold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px gold;
}

button:hover {
    background: orange;
    transform: scale(1.1);
}

.section {
    margin-top: 80px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    width: 120px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}

#modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    top: 0;
    left: 0;
}

.modal-content {
    background: white;
    color: black;
    width: 300px;
    margin: 15% auto;
    padding: 20px;
    border-radius: 15px;
    animation: muncul 0.5s ease;
}

@keyframes muncul {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

.close {
    margin-top: 15px;
    background: red;
    color: white;
}

footer {
    margin-top: 100px;
    padding: 20px;
    background: black;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌙 Marhaban ya Ramadan🌙</h1>
    <p>Semoga Ramadan membawa berkah dan kebahagiaan</p>

    <button id="btnTHR">Ada sesuatu untukmu</button>

    <div id="timer"></div>
</div>

<div class="section">
    <h2>Keutamaan Ramadan</h2>
    <p>Bulan penuh ampunan dan keberkahan</p>
</div>

<div class="cards">
    <div class="card">🌙 Puasa</div>
    <div class="card">🤲 Doa</div>
    <div class="card">💰 Sedekah</div>
</div>

<div class="section">
    <p>Semoga ibadah kita diterima</p>
</div>

<div id="modal">
    <div class="modal-content">
        <h2>Selamat!</h2>
        <p>Kamu mendapatkan THR!</p>
        <button class="close">Tutup</button>
    </div>
</div>

<footer>
    <p>© 2026 Ramadan Website</p>
</footer>

<script>
$(document).ready(function(){

    $("#btnTHR").click(function(){
        $("#modal").fadeIn();
    });

    $(".close").click(function(){
        $("#modal").fadeOut();
    });

});
</script>

</body>
</html>
